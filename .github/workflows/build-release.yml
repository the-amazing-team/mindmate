name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_release:
        description: 'Set to true to run build and release'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_release == true) }}

    steps:
      - name: 🏗 Checkout Repo
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🏗 Setup Android SDK # Added for reliability
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔑 Create .env file from Secrets
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🚀 Expo Prebuild
        run: npx expo prebuild --platform android

      - name: 🔧 Patch Gradle Timeout
        run: |
          sed -i 's/networkTimeout=10000/networkTimeout=60000/' android/gradle/wrapper/gradle-wrapper.properties

      - name: 📄 Create local.properties # Ensure Gradle finds the SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 🛠 Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
